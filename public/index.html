<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Browser Theme -->
    <meta name="theme-color" content="#050505" />
    <meta name="color-scheme" content="dark light" />

    <!-- Default title before React loads -->
    <title>Game On India | Arcade, VR, Bowling & Birthday Parties</title>

    <!-- Favicons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="%PUBLIC_URL%/favicon-96x96.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%PUBLIC_URL%/apple-touch-icon.png"
    />

    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/site.webmanifest" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- ======================================
         Organization Structured Data
         ====================================== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Game On India",
        "url": "https://gameonplay.in",
        "logo": "https://gameonplay.in/gameon.png",
        "image": "https://gameonplay.in/gameon.png",
        "description": "India's premium Family Entertainment Center offering Arcade Games, VR, Bowling, Birthday Parties and Kids Entertainment.",
        "sameAs": ["https://www.instagram.com/game_on_jalandhar"]
      }
    </script>

    <!-- ======================================
         Website Structured Data
         ====================================== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Game On India",
        "url": "https://gameonplay.in",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://gameonplay.in/games?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Ignore harmless Chrome warning -->
    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        },
        true,
      );
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>

    <!--
      Analytics intentionally omitted.
      Add Google Analytics, Google Tag Manager,
      Microsoft Clarity, or PostHog only if needed.
    -->
  </body>
</html>
