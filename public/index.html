<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Browser Theme -->
    <meta name="theme-color" content="#050505" />
    <meta name="color-scheme" content="dark light" />

    <!-- Browser title before React loads -->
    <!-- <title>Game On India</title> -->
    <title>Game On India | Arcade, VR, Bowling & Birthday Parties</title>

    <!-- Icons -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/gameon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/gameon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- ===============================
         ORGANIZATION SCHEMA
         =============================== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Game On India",
        "url": "https://gameonplay.in",
        "logo": "https://gameonplay.in/gameon.png",
        "image": "https://gameonplay.in/gameon.png",
        "description": "India's premium Family Entertainment Center offering Arcade Games, VR, Bowling, Birthday Parties and Kids Entertainment.",
        "sameAs": ["https://www.instagram.com/game_on_jalandhar"]
      }
    </script>

    <!-- ===============================
         WEBSITE SCHEMA
         =============================== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Game On India",
        "url": "https://gameonplay.in",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://gameonplay.in/games?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Ignore harmless browser warning -->
    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        },
        true,
      );
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>

    <!--
      PostHog removed.
      Add Google Analytics or PostHog later only if you actually use them.
    -->
  </body>
</html>
